<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Doctor Profile - MediFlow</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/chatbot.css" />
  <script src="js/config.js"></script>
  <script src="js/theme.js"></script>
</head>

<body>
  <!-- Navbar -->
  <header class="navbar">
    <div class="logo">
      <img src="assets/care.png" alt="Logo" height="40" />
      <span>Medi<strong>Flow</strong></span>
    </div>
    <nav>
      <ul>
        <li onclick="navigateTo('dashboard')">Home</li>
        <li onclick="navigateTo('history')">History</li>
        <li onclick="navigateTo('appointments')">Appointments</li>
        <li onclick="navigateTo('analytics')">Analytics</li>
        <li onclick="navigateTo('xray')">X-Ray</li>
        <li onclick="navigateTo('medicine')">Add Medicine</li>
      </ul>
    </nav>
    <div class="header-right">
      <button class="theme-toggle-btn" onclick="toggleTheme()" title="Toggle Dark Mode">
        <span class="theme-icon" id="theme-icon">🌙</span>
      </button>
    </div>
  </header>

  <main class="content-wrapper">
    <div class="form-container">
      <!-- Profile Header -->
      <div class="profile-header">
        <div class="profile-avatar" id="avatar">D</div>
        <div class="profile-info">
          <h1 id="fullNameHeader">Loading...</h1>
          <p id="emailHeader"></p>
          <p id="RegistrationNo" style="font-weight: 600; color: var(--accent-primary); margin-top: 5px;">Registration
            No.: -</p>
        </div>
      </div>

      <!-- Loading Indicator -->
      <div id="loadingMsg" style="text-align:center; padding:2rem; color:var(--text-muted);">Loading profile...</div>
      <div id="errorMsg"
        style="display:none; color:var(--danger); text-align:center; padding:1rem; background:rgba(239,68,68,0.05); border-radius:8px; margin-bottom:1rem;">
      </div>

      <!-- Profile Details -->
      <div class="profile-grid" id="profileGrid" style="display:none;">
        <div class="info-item">
          <span>Specialization</span>
          <p id="specialization">-</p>
        </div>
        <div class="info-item">
          <span>Clinic Name</span>
          <p id="clinicName">-</p>
        </div>
        <div class="info-item">
          <span>Experience</span>
          <p id="experience">-</p>
        </div>
        <div class="info-item">
          <span>Address</span>
          <p id="address">-</p>
        </div>
        <div class="info-item">
          <span>Phone</span>
          <p id="phone">-</p>
        </div>
        <div class="info-item">
          <span>Consultation Timings</span>
          <p id="timings">-</p>
        </div>
      </div>

      <!-- Buttons -->
      <div class="header-right" style="margin-top: 3rem; justify-content: center; width: 100%;">
        <button class="book-btn" onclick="window.location.href='profile-setup.html'">Edit Profile</button>
        <button class="book-btn" style="background: var(--danger);" onclick="logout()">Logout</button>
      </div>
    </div>
  </main>

  <script>
    async function loadProfile() {
      const email = localStorage.getItem("email");
      const token = localStorage.getItem("token");

      if (!email && !token) {
        window.location.href = "signup.html?mode=login";
        return;
      }

      let profileData = null;

      // 1. Try localStorage first for instant display
      try {
        const raw = localStorage.getItem("doctorProfile");
        if (raw) {
          const parsed = JSON.parse(raw);
          // Unwrap nested .doctor if needed
          profileData = parsed && parsed.doctor ? parsed.doctor : parsed;
        }
      } catch (e) { /* ignore */ }

      // 2. Always fetch fresh data from backend
      if (token) {
        const endpoints = [
          `${window.API_BASE_URL}/api/doctor/profile`,
          `${window.API_BASE_URL}/api/doctor/me`
        ];

        for (let ep of endpoints) {
          try {
            console.log(`Fetching profile from: ${ep}`);
            const res = await fetch(ep, {
              headers: { "Authorization": "Bearer " + token }
            });

            console.log(`Response status: ${res.status}`);
            if (!res.ok) continue;

            const json = await res.json();
            console.log("Profile API response:", json);

            let fetched = json && json.doctor ? json.doctor : json;
            if (fetched && typeof fetched === "object" && (fetched.fullName || fetched.name)) {
              profileData = fetched;
              localStorage.setItem("doctorProfile", JSON.stringify(profileData));
              break;
            }
          } catch (err) {
            console.warn("Error fetching profile from", ep, err);
          }
        }
      }

      // 3. Fallback: try email-based endpoint (no auth required)
      if (!profileData && email) {
        try {
          const res = await fetch(`${window.API_BASE_URL}/api/doctors/profile/` + encodeURIComponent(email));
          if (res.ok) {
            const json = await res.json().catch(() => null);
            if (json) {
              profileData = json.doctor || json.data?.doctor || json;
              if (profileData && (profileData.fullName || profileData.name)) {
                localStorage.setItem("doctorProfile", JSON.stringify(profileData));
              } else {
                profileData = null;
              }
            }
          }
        } catch (err) {
          console.warn("Email-based profile fetch failed", err);
        }
      }

      // Hide loading
      document.getElementById("loadingMsg").style.display = "none";

      // 4. If no profile found at all
      if (!profileData || (!profileData.fullName && !profileData.name)) {
        document.getElementById("errorMsg").style.display = "block";
        document.getElementById("errorMsg").textContent = "Profile not found. Please complete your profile setup.";
        document.getElementById("fullNameHeader").textContent = email || "Doctor";
        document.getElementById("emailHeader").textContent = email || "";
        document.getElementById("profileGrid").style.display = "grid";
        return;
      }

      // 5. Populate UI
      const name = profileData.fullName || profileData.name || "Doctor";
      const initials = name.charAt(0).toUpperCase();
      document.getElementById("avatar").textContent = initials;
      document.getElementById("fullNameHeader").textContent = name;
      document.getElementById("emailHeader").textContent = profileData.email || email || "";

      const regNo = profileData.registrationNo || profileData.RegistrationNo || profileData.regNo || "-";
      document.getElementById("RegistrationNo").textContent = "Registration No.: " + regNo;

      document.getElementById("specialization").textContent = profileData.specialization || "-";
      document.getElementById("clinicName").textContent = profileData.clinicName || "-";
      document.getElementById("address").textContent = profileData.address || "-";
      document.getElementById("phone").textContent = profileData.phone || profileData.mobile || "-";
      document.getElementById("timings").textContent = profileData.timings || profileData.consultationTimings || "-";
      document.getElementById("experience").textContent = profileData.experience
        ? (profileData.experience + (String(profileData.experience).includes("year") ? "" : " years"))
        : "-";

      document.getElementById("profileGrid").style.display = "grid";

      console.log("Profile loaded successfully:", profileData);
    }

    function navigateTo(page) {
      const routes = {
        'dashboard': 'doctor-dashboard.html',
        'history': 'history.html',
        'appointments': 'doctor-appointments.html',
        'analytics': 'analytics.html',
        'xray': 'xray.html',
        'medicine': 'medicine.html',
        'patient-portal': 'patient-auth.html'
      };
      if (routes[page]) {
        window.location.href = routes[page];
      }
    }

    function logout() {
      try { localStorage.setItem("global_logout", String(Date.now())); } catch (e) { }
      localStorage.removeItem("email");
      localStorage.removeItem("doctorProfile");
      localStorage.removeItem("token");
      localStorage.removeItem("loggedIn");
      localStorage.removeItem("doctorName");
      window.location.href = "maindashboard.html";
    }

    // Call loadProfile on page load
    document.addEventListener('DOMContentLoaded', loadProfile);
  </script>
  <script src="js/chatbot.js"></script>
</body>

</html>
